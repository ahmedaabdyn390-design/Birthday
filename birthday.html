<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد </title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #ffe6eb;
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            height: auto;
            transition: all 0.5s ease;
        }
        h1 {
            color: #ff4d6d;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .gif-container img {
            width: 150px;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            min-height: 80px;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #yesBtn {
            background-color: #4cc9f0;
            color: white;
        }
        #noBtn {
            background-color: #ff4d6d;
            color: white;
            position: relative;
        }
        /* صفحة الهدايا */
        .hidden {
            display: none !important;
        }
        .gifts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .gift-box {
            background: #fff0f3;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            border: 2px dashed #ffb3c1;
            transition: transform 0.3s;
        }
        .gift-box:hover {
            transform: scale(1.05);
        }
        .gift-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .gift-title {
            font-size: 14px;
            color: #ff4d6d;
            font-weight: bold;
        }
        /* شاشات عرض المحتوى */
        .display-area {
            margin-top: 25px;
            padding: 15px;
            background: #fff;
            border-radius: 10px;
            border: 1px solid #ffe5ec;
        }
        
        /* تصميم الـ Carousel المعدل لضمان ظهور الأسهم بوضوح */
        .carousel-container {
            position: relative;
            width: 100%;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-carousel {
            width: 100%;
            display: flex;
            flex-direction: row;
            overflow: hidden; /* منع التمرير العشوائي باليد بالكامل */
            border-radius: 10px;
            scroll-behavior: smooth;
        }
        .photo-carousel img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        /* أسهم واضحة جداً وبألوان مميزة فوق الصور */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: #ff4d6d;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .nav-arrow:hover {
            background: #ff758f;
        }
        .right-arrow {
            right: -10px; /* خروج بسيط للجمالية والتوضيح */
        }
        .left-arrow {
            left: -10px;
        }
        
        /* مؤشرات الدوائر (Dots) */
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 15px 0 5px 0;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #ffd0d6;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .dot.active {
            background-color: #ff4d6d;
            width: 22px;
            border-radius: 6px;
        }

        /* نافذة معاينة الصور الكبير */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            max-width: 90%;
            max-height: 80%;
            border-radius: 10px;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 35px;
            cursor: pointer;
        }

        /* مشغل صوتي مخصص */
        .custom-player {
            background: #fff0f3;
            border-radius: 15px;
            padding: 20px;
            margin-top: 15px;
            border: 1px solid #ffb3c1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .player-disk {
            font-size: 50px;
            animation: spin 4s linear infinite;
            animation-play-state: paused;
        }
        .player-disk.playing {
            animation-play-state: running;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }
        .play-btn {
            background: #ff4d6d;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }
        .progress-container {
            width: 70%;
            background: #ffd0d6;
            height: 6px;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }
        .progress-bar {
            background: #ff4d6d;
            height: 100%;
            width: 0%;
            border-radius: 5px;
        }

        .letter-text {
            color: #590d22;
            line-height: 1.6;
            font-size: 16px;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="container" id="quizContainer">
        <div class="gif-container">
            <div style="font-size: 80px;" id="mainEmoji">🐱</div>
        </div>
        <h1 id="questionText">بتلعبي معايا؟ هل بتحبيني؟ 🥰</h1>
        
        <div class="btn-group">
            <button id="yesBtn" onclick="nextStage()">نعم</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">لا</button>
        </div>
    </div>

    <div class="container hidden" id="giftsContainer">
        <div style="font-size: 50px;">🐻❤️</div>
        <h1>كنت عارفك حتدوسي نعم <br>
        Happy Birthday To You, Beautiful</h1>
        <p style="color: #666; margin-bottom: 15px;">اكتشفي الهدايا الثلاثة المجهزلها ليكي :</p>
        
        <div class="gifts-grid">
            <!-- <div class="gift-box" onclick="showGift(1)">
                <div class="gift-icon">📸</div>
                <div class="gift-title">ذكرياتنا</div>
            </div> -->
            <div class="gift-box" onclick="showGift(2)">
                <div class="gift-icon">🎵</div>
                <div class="gift-title">أغنيتنا</div>
            </div>
            <div class="gift-box" onclick="showGift(3)">
                <div class="gift-icon">💌</div>
                <div class="gift-title">رسالتي ليكي</div>
            </div>
        </div>

        <div id="giftDisplay" class="display-area hidden"></div>
    </div>

    <div class="modal" id="imageModal" onclick="closePreview()">
        <span class="modal-close">&times;</span>
        <img class="modal-content" id="modalImg" src="">
    </div>

    <script>
        let noCount = 0;
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionText = document.getElementById('questionText');
        const mainEmoji = document.getElementById('mainEmoji');

        const phrases = [
            "متأكدة؟ 🥺",
            "فكرتي كويس؟ 💔",
            "طب بجد بجد؟ 😢",
            "مستحيل أديكي فرصة تقولي لا! 😂",
            "خلاص مافي خيار تاني غير نعم 😈"
        ];

        const emojis = ["🧐", "😭", "💔", "😂", "👻"];

        function moveNoButton() {
            noCount++;
            if (noCount <= phrases.length) {
                questionText.innerText = phrases[noCount - 1];
                mainEmoji.innerText = emojis[noCount - 1];
            }

            let currentYesSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = (currentYesSize + 12) + 'px';
            yesBtn.style.padding = (parseFloat(window.getComputedStyle(yesBtn).paddingTop) + 5) + 'px ' + (parseFloat(window.getComputedStyle(yesBtn).paddingLeft) + 10) + 'px';

            let currentNoSize = parseFloat(window.getComputedStyle(noBtn).fontSize);
            if (currentNoSize > 5) {
                noBtn.style.fontSize = (currentNoSize - 2) + 'px';
                noBtn.style.padding = '5px 10px';
            }

            const container = document.querySelector('.btn-group');
            const containerRect = container.getBoundingClientRect();
            const x = Math.random() * (containerRect.width - noBtn.offsetWidth - 20) + 10;
            const y = Math.random() * 50 - 25;

            noBtn.style.position = 'absolute';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function nextStage() {
            document.getElementById('quizContainer').classList.add('hidden');
            document.getElementById('giftsContainer').classList.remove('hidden');
        }

        // متغير التحكم الأساسي في السلايدر
        let currentImgIndex = 0;

        function showGift(giftNumber) {
            const display = document.getElementById('giftDisplay');
            display.classList.remove('hidden');

            if (giftNumber === 1) {
                currentImgIndex = 0; 
                display.innerHTML = `
                    <div class="photo-album">
                        <h3>أجمل لحظاتنا 🌟</h3>
                        <div class="carousel-container">
                            <button class="nav-arrow right-arrow" onclick="navigateCarousel(-1)">❯</button>
                            <div class="photo-carousel" id="carousel">
                                <img src="./image_1.jpg" onclick="previewImage(this.src)"/>
                                <img src="./image_2.jpg" onclick="previewImage(this.src)"/>
                                <img src="./image_3.jpg" onclick="previewImage(this.src)"/>
                            </div>
                            <button class="nav-arrow left-arrow" onclick="navigateCarousel(1)">❮</button>
                        </div>
                        <div class="carousel-dots">
                            <span class="dot active" id="dot0" onclick="jumpToImage(0)"></span>
                            <span class="dot" id="dot1" onclick="jumpToImage(1)"></span>
                            <span class="dot" id="dot2" onclick="jumpToImage(2)"></span>
                        </div>
                        <div style="font-size:30px;">👩‍❤️‍👨✨</div>
                    </div>
                `;
                // تأخير بسيط جداً لإعطاء المتصفح فرصة لعرض العناصر وقراءة الأبعاد بدقة 
                setTimeout(() => {
                    updateCarouselDisplay();
                }, 50);

            } else if (giftNumber === 2) {
                display.innerHTML = `
<h3>أغنية بهديها ليكي 🎧</h3>
                    <p style="margin-bottom:10px; color:#666;">كل ما اسمعها بفتكرك...</p>
                    <audio controls style="width: 100%;">
                        <source src="./song_1.mp3" type="audio/mpeg">
                        متصفحك لا يدعم تشغيل الصوت.
                    </audio>
                `;
                setupAudioEventListeners();
            } else if (giftNumber === 3) {
                display.innerHTML = `
                    <h3>كل سنة وأنتي طيبة يا كل دنيتي 💖</h3>
                    <p class="letter-text" style="margin-top:10px;">
                        اليوم ده مش عيد ميلادك أنتي وبس، ده العيد اللي الدنيا نورت فيه بوجودك. 
                        شكراً لإنك في حياتي، وشكراً على كل ضحكة وكل لحظة حلوة بنعيشها سوا. 
                        بتمنى ليكي سنة مليانة فرح ونجاح، وأفضل دايماً جنبك ومعاكِ. بحبك جداً! 🥰
                    </p>
                `;
            }
        }

        // دالة تحريك السلايدر المضمونة بالكامل
        function updateCarouselDisplay() {
            const carousel = document.getElementById('carousel');
            if(!carousel) return;
            
            const width = carousel.clientWidth;
            
            // التحريك بالتمرير البرمجي مع مراعاة اتجاه الـ RTL
            carousel.scrollLeft = -width * currentImgIndex; 

            // تحديث حالة الـ Active للـ Dots بشكل قاطع بالـ if
            const d0 = document.getElementById('dot0');
            const d1 = document.getElementById('dot1');
            const d2 = document.getElementById('dot2');

            if(d0 && d1 && d2) {
                d0.classList.remove('active');
                d1.classList.remove('active');
                d2.classList.remove('active');

                if (currentImgIndex === 0) {
                    d0.classList.add('active');
                } else if (currentImgIndex === 1) {
                    d1.classList.add('active');
                } else if (currentImgIndex === 2) {
                    d2.classList.add('active');
                }
            }
        }

        function navigateCarousel(direction) {
            currentImgIndex += direction;
            if (currentImgIndex < 0) currentImgIndex = 0;
            if (currentImgIndex > 2) currentImgIndex = 2;
            updateCarouselDisplay();
        }

        function jumpToImage(index) {
            currentImgIndex = index;
            updateCarouselDisplay();
        }

        function previewImage(src) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            modal.classList.add('show');
            modalImg.src = src;
        }

        function closePreview() {
            document.getElementById('imageModal').classList.remove('show');
        }

        let audio, playBtn, progressBar, disk;

        function setupAudioEventListeners() {
            audio = document.getElementById('mainAudio');
            playBtn = document.getElementById('playBtn');
            progressBar = document.getElementById('progressBar');
            disk = document.getElementById('disk');

            audio.addEventListener('timeupdate', () => {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
            });

            audio.addEventListener('ended', () => {
                playBtn.innerText = '▶';
                disk.classList.remove('playing');
            });
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = '⏸';
                disk.classList.add('playing');
            } else {
                audio.pause();
                playBtn.innerText = '▶';
                disk.classList.remove('playing');
            }
        }

        function setProgress(e) {
            const width = e.currentTarget.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            if (duration) {
                audio.currentTime = (clickX / width) * duration;
            }
        }
    </script>
</body>
</html>
